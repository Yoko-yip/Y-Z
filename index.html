        /* If NOT english mode -> Chinese is active */
        body:not(.english-mode) .lang-option.zh { 
            opacity: 1; 
            border-bottom: 2px solid 3A3836; 
        }
        
        /* If English mode -> English is active */
        body.english-mode .lang-option.en { 
            opacity: 1; 
            border-bottom: 2px solid 3A3836; 
        }
        /* --- LANGUAGE VISIBILITY LOGIC (UNIVERSAL FIX) --- */
        
        /* 1. Default (Chinese Mode) */
        /* Hide all English elements (divs, spans, images) */
        .lang-en, 
        div.lang-en, 
        span.lang-en, 
        img.lang-en { 
            display: none !important; 
        }
        
        /* Show all Chinese elements */
        .lang-zh, 
        div.lang-zh, 
        span.lang-zh { 
            display: inherit !important; 
        }
        img.lang-zh { display: block !important; }


        /* 2. English Mode */
        /* Hide all Chinese elements */
        body.english-mode .lang-zh, 
        body.english-mode div.lang-zh, 
        body.english-mode span.lang-zh, 
        body.english-mode img.lang-zh { 
            display: none !important;

        /* Show all English elements */

            width: 100%;
            height: auto;

            filter: drop-shadow(0 15px 35px rgba(0,0,0,0.2));
            transition: transform 0.3s ease, filter 0.3s ease;
            
            /* Hardware acceleration fixes to stop the shadow from glitching */
            transform: translateZ(0); 
            will-change: transform, filter;
        }

        .envelope-wrapper:hover .static-envelope-img {
            transform: scale(1.02) translateZ(0);
        }

        /* SEQUENCE 4: Chinese Instruction Text */
        .entrance-instruction {

            /* Fades in at 3.5s, then immediately starts pulsing */
            animation: pulse 2s infinite;
            animation-delay: 1.8s; /* Change this number to exactly match when you want it to pop in! */
            transition: opacity 0.5s ease;
        }
        
        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }

        /* 1. Static Willow Background & Blur Overlay */
        #willow-bg-container {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%; 
            overflow: hidden;
        }

        .willow-bg-image {
            width: 100%;

        }

       
        
        /* 2. Atmospheric Shadow Layer */
        .shadow-overlay {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            z-index: 55;
            pointer-events: none;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 255, 240, 0.6) 0%, rgba(255, 255, 240, 0) 60%),
                radial-gradient(circle at 20% 80%, rgba(250, 250, 210, 0.4) 0%, rgba(250, 250, 210, 0) 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 250, 205, 0.4) 0%, rgba(255, 250, 205, 0) 50%);
            background-size: 50% 50%;
            background-repeat: no-repeat;
            background-position: top right;
            animation: shadowSway 5s ease-in-out infinite alternate;
        }
        
        @keyframes shadowSway { 
            0% { transform: translateX(0) rotate(0deg); } 
            100% { transform: translateX(50px) rotate(3deg); } 
        }

        .lottie-bird-container {
